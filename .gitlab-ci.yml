stages:
  - build
  - deploy

build-x86:
  stage: build
  tags:
    - exec
  script:
    - make x86
    - make push-x86
  only:
    - master

build-arm:
  stage: build
  tags:
    - exec-arm
  script:
    - make arm
    - make push-arm
  only:
    - master

push-manifest:
  stage: deploy
  tags:
    - exec
  depends:
    - build-x86
    - build-arm
  script:
    - make push-manifest
  only:
    - master